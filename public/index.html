<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOC 2 Audit Checklist Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f7; color: #1a1a1a; padding: 2rem; min-height: 100vh; }
    .wrap { max-width: 720px; margin: 0 auto; }
    .app-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .app-sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
    .field label { font-size: 12px; font-weight: 500; color: #555; }
    .field select { height: 36px; border: 1px solid #ddd; border-radius: 8px; padding: 0 10px; font-size: 14px; background: #fff; }
    .gen-btn { height: 36px; padding: 0 18px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 14px; cursor: pointer; white-space: nowrap; }
    .gen-btn:hover { background: #f0f0f0; }
    .gen-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .output { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; min-height: 100px; }
    .placeholder { color: #999; font-size: 14px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -3px; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cl-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #eee; }
    .cl-title { font-size: 15px; font-weight: 500; }
    .cl-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; }
    .badge-tsc { background: #eff6ff; color: #1d4ed8; }
    .badge-prev { background: #f0fdf4; color: #15803d; }
    .badge-det { background: #fffbeb; color: #b45309; }
    .badge-corr { background: #fef2f2; color: #b91c1c; }
    .export-btn { font-size: 13px; color: #3b82f6; background: none; border: none; cursor: pointer; padding: 0; }
    .clear-btn { font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; padding: 0; }
    .clear-btn:hover { color: #dc2626; }
    .prog-bar { height: 4px; background: #eee; border-radius: 99px; margin-bottom: 8px; overflow: hidden; }
    .prog-fill { height: 100%; background: #3b82f6; border-radius: 99px; transition: width 0.3s; }
    .prog-label { font-size: 12px; color: #aaa; margin-bottom: 1rem; }
    .section-name { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin: 1.25rem 0 6px; }
    .check-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .check-item:last-child { border-bottom: none; }
    .check-row { display: flex; gap: 10px; align-items: flex-start; }
    .checkbox { width: 16px; height: 16px; border: 1.5px solid #ccc; border-radius: 3px; flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #fff; }
    .checkbox.checked { background: #3b82f6; border-color: #3b82f6; }
    .check-icon { color: white; font-size: 11px; display: none; }
    .checkbox.checked .check-icon { display: block; }
    .check-text { font-size: 14px; line-height: 1.5; flex: 1; }
    .check-text.done { color: #aaa; text-decoration: line-through; }
    .notes-toggle { font-size: 12px; color: #3b82f6; background: none; border: none; cursor: pointer; padding: 0; margin-top: 5px; margin-left: 26px; display: block; }
    .notes-area { margin: 6px 0 0 26px; }
    .notes-area textarea { width: 100%; font-size: 13px; border-radius: 6px; border: 1px solid #ddd; background: #fafafa; color: #1a1a1a; padding: 6px 8px; resize: vertical; min-height: 56px; font-family: inherit; line-height: 1.5; }
    .saved-indicator { font-size: 11px; color: #16a34a; }
    .error-msg { color: #dc2626; font-size: 14px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1 class="app-title">SOC 2 Audit Checklist Generator</h1>
  <p class="app-sub">Checklists auto-save as you work. Notes and completion status persist across sessions.</p>
  <div class="controls">
    <div class="field">
      <label for="tsc-sel">Trust Services Criteria</label>
      <select id="tsc-sel" onchange="document.getElementById('gen-btn').disabled = !this.value">
        <option value="">— select criteria —</option>
        <option value="Security (CC)">Security — Common Criteria (CC)</option>
        <option value="Availability (A)">Availability (A)</option>
        <option value="Processing Integrity (PI)">Processing Integrity (PI)</option>
        <option value="Confidentiality (C)">Confidentiality (C)</option>
        <option value="Privacy (P)">Privacy (P)</option>
      </select>
    </div>
    <div class="field">
      <label for="ctrl-sel">Control type</label>
      <select id="ctrl-sel">
        <option value="">— all types —</option>
        <option value="Preventive">Preventive</option>
        <option value="Detective">Detective</option>
        <option value="Corrective">Corrective</option>
      </select>
    </div>
    <div class="field" style="flex:0">
      <label>&nbsp;</label>
      <button class="gen-btn" id="gen-btn" disabled onclick="generate()">Generate</button>
    </div>
  </div>
  <div class="output" id="output">
    <p class="placeholder">Select a criteria above and click Generate to build your checklist.</p>
  </div>
</div>
<script>
  const STORE_KEY = 'soc2_checklist_v2';
  function saveState() {
    const state = { tsc: window._tsc, ctrl: window._ctrl, data: window._data, checks: window._checks, notes: window._notes };
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
  }
  function loadState() {
    try { const raw = localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : null; } catch(e) { return null; }
  }
  function clearState() {
    try { localStorage.removeItem(STORE_KEY); } catch(e) {}
    window._data = null; window._checks = {}; window._notes = {};
    document.getElementById('output').innerHTML = '<p class="placeholder">Checklist cleared. Select a criteria to start fresh.</p>';
  }
  function controlBadgeClass(ctrl) {
    if (ctrl === 'Preventive') return 'badge badge-prev';
    if (ctrl === 'Detective') return 'badge badge-det';
    if (ctrl === 'Corrective') return 'badge badge-corr';
    return '';
  }
  function toggleCheck(id) {
    window._checks[id] = !window._checks[id];
    document.getElementById('cb-' + id)?.classList.toggle('checked', window._checks[id]);
    document.getElementById('ct-' + id)?.classList.toggle('done', window._checks[id]);
    updateProgress();
    saveState();
  }
  function updateProgress() {
    const keys = Object.keys(window._checks);
    const done = keys.filter(k => window._checks[k]).length;
    const bar = document.getElementById('prog-fill');
    const lbl = document.getElementById('prog-label');
    if (bar) bar.style.width = keys.length ? Math.round(done / keys.length * 100) + '%' : '0%';
    if (lbl) lbl.textContent = done + ' of ' + keys.length + ' items completed';
  }
  function toggleNotes(id) {
    const area = document.getElementById('notes-area-' + id);
    const btn = document.getElementById('notes-toggle-' + id);
    if (!area) return;
    const hidden = area.style.display === 'none';
    area.style.display = hidden ? 'block' : 'none';
    btn.textContent = hidden ? 'Hide notes' : '+ Add notes';
  }
  function saveNote(id) {
    const ta = document.getElementById('notes-ta-' + id);
    if (!ta) return;
    window._notes[id] = ta.value;
    const ind = document.getElementById('notes-saved-' + id);
    if (ind) { ind.textContent = 'Saved'; setTimeout(() => { ind.textContent = ''; }, 1500); }
    saveState();
  }
  function renderChecklist(data, tsc, ctrl, checks, notes) {
    window._data = data; window._tsc = tsc; window._ctrl = ctrl;
    window._checks = checks || {}; window._notes = notes || {};
    let itemId = 0;
    const total = data.reduce((n, s) => n + s.items.length, 0);
    data.forEach(s => s.items.forEach(() => { const id = 'item-' + itemId++; if (!(id in window._checks)) window._checks[id] = false; }));
    itemId = 0;
    let html = '<div class="cl-header"><div><div class="cl-title">Audit checklist</div><div class="cl-meta"><span class="badge badge-tsc">' + tsc + '</span>';
    if (ctrl) html += '<span class="' + controlBadgeClass(ctrl) + '">' + ctrl + '</span>';
    html += '</div></div><div style="display:flex;gap:12px;align-items:center">';
    html += '<button class="export-btn" onclick="exportCSV()">&#8595; Export CSV</button>';
    html += '<button class="clear-btn" onclick="clearState()">Clear</button>';
    html += '</div></div>';
    html += '<div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>';
    html += '<p class="prog-label" id="prog-label">0 of ' + total + ' items completed</p>';
    data.forEach(section => {
      html += '<p class="section-name">' + section.category + '</p>';
      section.items.forEach(item => {
        const id = 'item-' + itemId;
        const isChecked = window._checks[id] || false;
        const hasNote = !!window._notes[id];
        html += '<div class="check-item"><div class="check-row">';
        html += '<div class="checkbox' + (isChecked ? ' checked' : '') + '" id="cb-' + id + '" onclick="toggleCheck(\'' + id + '\')"><span class="check-icon">&#10003;</span></div>';
        html += '<span class="check-text' + (isChecked ? ' done' : '') + '" id="ct-' + id + '">' + item + '</span>';
        html += '</div>';
        html += '<button class="notes-toggle" id="notes-toggle-' + id + '" onclick="toggleNotes(\'' + id + '\')">' + (hasNote ? 'View notes' : '+ Add notes') + '</button>';
        html += '<div class="notes-area" id="notes-area-' + id + '" style="display:' + (hasNote ? 'block' : 'none') + '">';
        html += '<textarea id="notes-ta-' + id + '" placeholder="Add your audit notes here..." oninput="saveNote(\'' + id + '\')">' + (window._notes[id] || '') + '</textarea>';
        html += '<span class="saved-indicator" id="notes-saved-' + id + '"></span>';
        html += '</div></div>';
        itemId++;
      });
    });
    document.getElementById('output').innerHTML = html;
    updateProgress();
  }
  async function generate() {
    const tsc = document.getElementById('tsc-sel').value;
    const ctrl = document.getElementById('ctrl-sel').value;
    if (!tsc) return;
    const btn = document.getElementById('gen-btn');
    btn.disabled = true;
    document.getElementById('output').innerHTML = '<p class="placeholder"><span class="spinner"></span>Generating checklist for ' + tsc + (ctrl ? ' — ' + ctrl + ' controls' : '') + '…</p>';
    const ctrlContext = ctrl ? 'Focus specifically on ' + ctrl + ' controls — controls designed to ' + (ctrl === 'Preventive' ? 'prevent issues before they occur.' : ctrl === 'Detective' ? 'detect issues after they occur.' : 'correct and remediate issues after detection.') : 'Include a mix of preventive, detective, and corrective controls.';
    const prompt = `You are a SOC 2 Type II audit expert. Generate a structured audit checklist for the "${tsc}" Trust Services Criteria. ${ctrlContext}\n\nReturn ONLY a JSON array with NO markdown, NO backticks, NO explanation. The structure must be exactly:\n[{"category":"Category Name","items":["Verify that...","Confirm that..."]}]\n\nRequirements:\n- 4 to 5 categories relevant to ${tsc}\n- 3 to 4 audit check items per category\n- Items must be specific, actionable auditor verification tasks\n- Base items on actual SOC 2 control requirements\n- Do not include any text outside the JSON array`;
    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tsc, ctrl })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderChecklist(data.checklist, tsc, ctrl, {}, {});
      saveState();
    } catch(err) {
      document.getElementById('output').innerHTML = '<p class="error-msg">Something went wrong. Please try again.</p>';
    }
    btn.disabled = false;
  }
  function exportCSV() {
    if (!window._data) return;
    let csv = 'Category,Check Item,Status,Notes\n';
    let i = 0;
    window._data.forEach(s => {
      s.items.forEach(item => {
        const id = 'item-' + i++;
        csv += '"' + s.category + '","' + item.replace(/"/g,'""') + '","' + (window._checks[id] ? 'Complete' : 'Pending') + '","' + (window._notes[id] || '').replace(/"/g,'""') + '"\n';
      });
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = (window._tsc || 'soc2').replace(/[^a-z0-9]/gi,'_') + '_checklist.csv';
    a.click();
  }
  window._checks = {}; window._notes = {};
  const saved = loadState();
  if (saved && saved.data) {
    window._tsc = saved.tsc; window._ctrl = saved.ctrl;
    if (saved.tsc) document.getElementById('tsc-sel').value = saved.tsc;
    if (saved.ctrl) document.getElementById('ctrl-sel').value = saved.ctrl;
    document.getElementById('gen-btn').disabled = !saved.tsc;
    renderChecklist(saved.data, saved.tsc, saved.ctrl, saved.checks, saved.notes);
  }
</script>
</body>
</html>
